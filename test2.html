<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EYE LOCK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+KR:wght@400;700&display=swap');

/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
body { font-family:'Noto Sans KR', sans-serif; color:#ddd; touch-action:none; user-select:none; }

/* ── SCREEN SYSTEM ── */
.scr {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 28px;
  transition: opacity .25s ease;
}
.scr.off { opacity: 0; pointer-events: none; }

/* ── TITLE SCREEN ── */
#s-title { background: #000; }
.title-logo {
  font-family: 'Orbitron', monospace;
  font-size: clamp(3rem, 15vw, 5.5rem);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 40px rgba(255,30,60,.8), 0 0 80px rgba(255,30,60,.3);
  letter-spacing: .05em;
  line-height: 1;
}
.title-logo em { color: #ff1e3c; font-style: normal; }
.title-sub {
  font-family: 'Orbitron', monospace;
  font-size: .65rem;
  letter-spacing: .35em;
  color: #333;
  text-transform: uppercase;
  margin-top: 2px;
}
.rules {
  background: #0a0a0a;
  border: 1px solid #1c1c1c;
  border-radius: 14px;
  padding: 18px 22px;
  width: 100%; max-width: 400px;
  font-size: .83rem;
  line-height: 1.9;
  color: #666;
}
.rules strong { color: #bbb; }
.rules .hl { color: #ff1e3c; }

/* ── BUTTONS ── */
.btn {
  width: 100%; max-width: 360px;
  padding: 16px; border: none; border-radius: 12px;
  font-family: 'Orbitron', monospace;
  font-size: .9rem; font-weight: 700;
  letter-spacing: .1em; cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(.96); opacity: .85; }
.btn-red   { background: #ff1e3c; color: #fff; }
.btn-green { background: #00ff88; color: #000; }
.btn-ghost { background: transparent; color: #555; border: 1px solid #1c1c1c; }
.btn:disabled { opacity: .3; pointer-events: none; }

/* ── CALIBRATION SCREEN ── */
#s-cal { background: #000; padding: 0; }
#cal-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

/* ── UPLOAD SCREEN ── */
#s-upload { background: #000; }
.up-title {
  font-family: 'Orbitron', monospace;
  font-size: 1rem; font-weight: 700;
  color: #fff; letter-spacing: .08em;
}
.up-area {
  width: 100%; max-width: 380px; height: 200px;
  border: 1.5px dashed #222; border-radius: 14px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; cursor: pointer; overflow: hidden; position: relative;
  transition: border-color .2s;
}
.up-area:active { border-color: #ff1e3c; }
.up-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
.up-icon { font-size: 2.4rem; }
.up-hint { font-size: .8rem; color: #333; }
#file-input { display: none; }

/* ── GAME SCREEN ── */
#s-game { padding: 0; justify-content: flex-start; background: #000; }
#hud {
  width: 100%; padding: 10px 18px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
  position: relative; z-index: 10; flex-shrink: 0;
}
#hud-time {
  font-family: 'Orbitron', monospace;
  font-size: 1.6rem; font-weight: 900;
  color: #00ff88;
  text-shadow: 0 0 12px rgba(0,255,136,.5);
}
#hud-label { font-size: .6rem; letter-spacing: .18em; color: #222; text-transform: uppercase; }
#hud-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #00ff88; box-shadow: 0 0 8px #00ff88;
  transition: background .1s, box-shadow .1s;
}
#hud-dot.red { background: #ff1e3c; box-shadow: 0 0 8px #ff1e3c; }

#viewport {
  flex: 1; width: 100%; position: relative; overflow: hidden; background: #000;
}
#game-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover; display: block;
}
/* The black mask covers bottom portion — revealed by shrinking height */
#mask {
  position: absolute; left: 0; right: 0; bottom: 0;
  background: #000; z-index: 2;
  /* height set by JS */
}
/* Safe zone indicator */
#zone-line {
  position: absolute; left: 0; right: 0; top: 25%;
  height: 2px; background: rgba(255,30,60,.6);
  z-index: 5; pointer-events: none;
}
#zone-shade {
  position: absolute; left: 0; right: 0; top: 0; height: 25%;
  background: rgba(255,30,60,.05);
  border-bottom: 1px solid rgba(255,30,60,.2);
  z-index: 5; pointer-events: none;
}

/* ── GAMEOVER SCREEN ── */
#s-over { background: #000; }
.over-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(2rem, 11vw, 3.5rem);
  font-weight: 900; color: #ff1e3c;
  text-shadow: 0 0 30px rgba(255,30,60,.9);
  letter-spacing: .08em;
}
.over-sub { font-size: .7rem; letter-spacing: .2em; color: #333; text-transform: uppercase; }
.score-card {
  background: #0a0a0a; border: 1px solid #1c1c1c;
  border-radius: 18px; padding: 26px 44px; text-align: center;
  width: 100%; max-width: 300px;
}
.score-num {
  font-family: 'Orbitron', monospace;
  font-size: clamp(3rem, 18vw, 6rem);
  font-weight: 900; color: #fff; line-height: 1;
}
.score-unit { font-size: .7rem; letter-spacing: .2em; color: #333; margin-top: 6px; }

/* ── GLOBAL GAZE DOT ── */
#gaze-dot {
  position: fixed;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(0,255,136,.9);
  box-shadow: 0 0 0 4px rgba(0,255,136,.25), 0 0 16px rgba(0,255,136,.6);
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 99999;
  display: none;
  /* NO CSS transition — JS handles smoothing */
}
#gaze-dot.red {
  background: rgba(255,30,60,.9);
  box-shadow: 0 0 0 4px rgba(255,30,60,.25), 0 0 16px rgba(255,30,60,.6);
}

/* ── DANGER FLASH ── */
#flash {
  position: fixed; inset: 0;
  background: #ff1e3c; opacity: 0;
  pointer-events: none; z-index: 9000;
  transition: opacity .08s;
}
#flash.on { opacity: .25; }

/* ── WARNING BAR ── */
#warn {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 8px; text-align: center;
  font-family: 'Orbitron', monospace;
  font-size: .6rem; letter-spacing: .2em;
  background: #ff1e3c; color: #fff;
  transform: translateY(-100%); transition: transform .18s;
  z-index: 9500;
}
#warn.on { transform: translateY(0); }

/* ── LOADER OVERLAY ── */
#loader {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; z-index: 99000;
  transition: opacity .3s;
}
#loader.off { opacity: 0; pointer-events: none; }
#loader p {
  font-family: 'Orbitron', monospace;
  font-size: .75rem; letter-spacing: .2em; color: #333;
}
#loader small { font-size: .7rem; color: #222; text-align: center; line-height: 1.7; max-width: 240px; }
.spinner {
  width: 42px; height: 42px;
  border: 3px solid #111; border-top-color: #ff1e3c;
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Force all webgazer-injected video/canvas off-screen */
#webgazerVideoFeed,
#webgazerVideoCanvas,
#webgazerFaceOverlay,
#webgazerGazeDot,
canvas[style*="z-index"] {
  position: fixed !important;
  left: -9999px !important; top: -9999px !important;
  width: 1px !important; height: 1px !important;
  opacity: 0 !important; pointer-events: none !important;
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <p>INITIALIZING</p>
  <div class="spinner"></div>
  <small>전면 카메라 권한을 허용해 주세요.<br>카메라는 시선 감지에만 사용되며<br>외부로 전송되지 않습니다.</small>
</div>

<!-- GAZE DOT (always on top) -->
<div id="gaze-dot"></div>

<!-- FLASH / WARN -->
<div id="flash"></div>
<div id="warn">⚠ 시선 이탈 — 위를 봐주세요!</div>

<!-- ① TITLE -->
<div class="scr" id="s-title">
  <div style="text-align:center">
    <div class="title-logo">EYE<em>LOCK</em></div>
    <div class="title-sub">눈을 떼지 마라</div>
  </div>
  <div class="rules">
    <strong>게임 방법</strong><br>
    1. 시선 보정 5포인트 응시<br>
    2. 사진을 선택하고 게임 시작<br>
    3. 사진이 2초에 걸쳐 아래로 드러납니다<br>
    4. <span class="hl">시선을 화면 상단 25% 안에 유지</span><br>
    5. 0.5초 이상 이탈 시 게임오버
  </div>
  <button class="btn btn-red" id="btn-begin">시작하기</button>
</div>

<!-- ② CALIBRATION -->
<div class="scr off" id="s-cal">
  <canvas id="cal-canvas"></canvas>
</div>

<!-- ③ UPLOAD -->
<div class="scr off" id="s-upload">
  <div class="up-title">사진 선택</div>
  <div class="up-area" id="up-area">
    <span class="up-icon">🖼</span>
    <span class="up-hint">탭하여 앨범에서 선택</span>
  </div>
  <input type="file" id="file-input" accept="image/*">
  <button class="btn btn-green" id="btn-play" disabled>게임 시작</button>
  <button class="btn btn-ghost" id="btn-recal">시선 재보정</button>
</div>

<!-- ④ GAME -->
<div class="scr off" id="s-game">
  <div id="hud">
    <div id="hud-time">0.00</div>
    <div id="hud-label">SAFE ZONE · TOP 25%</div>
    <div id="hud-dot"></div>
  </div>
  <div id="viewport">
    <img id="game-img" src="" alt="">
    <div id="mask"></div>
    <div id="zone-shade"></div>
    <div id="zone-line"></div>
  </div>
</div>

<!-- ⑤ GAMEOVER -->
<div class="scr off" id="s-over">
  <div class="over-title">GAME OVER</div>
  <div class="over-sub">시선 이탈 감지</div>
  <div class="score-card">
    <div class="score-num" id="score-num">0.00</div>
    <div class="score-unit">초 버팀</div>
  </div>
  <button class="btn btn-red" id="btn-retry">다시 도전</button>
  <button class="btn btn-ghost" id="btn-home">처음으로</button>
</div>

<!-- WebGazer -->
<script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
<script>
'use strict';

/* ════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════ */
const el  = id => document.getElementById(id);
const on  = (id, ev, fn) => el(id).addEventListener(ev, fn);
const scr = {}; // screen refs populated below
['title','cal','upload','game','over'].forEach(k => scr[k] = el('s-'+k));

function show(key) {
  Object.values(scr).forEach(s => s.classList.add('off'));
  scr[key].classList.remove('off');
}

/* ════════════════════════════════════════════════════════
   GAZE ENGINE
   
   WebGazer outputs noisy (x,y) in screen pixels.
   We apply:
   1) Double exponential smoothing (adaptive alpha)
   2) 5-point affine calibration via least-squares
   3) Clamp to viewport
════════════════════════════════════════════════════════ */

// Raw WebGazer output (screen px, uncalibrated)
let wgRaw = { x: innerWidth/2, y: innerHeight/2 };
// Smoothed raw (before calibration)
let wgSmooth = { x: innerWidth/2, y: innerHeight/2 };
// Final calibrated gaze (screen px)
let gaze = { x: innerWidth/2, y: innerHeight/2 };

// Smoothing params
const S_FAST = 0.30; // alpha when eye moves fast
const S_SLOW = 0.10; // alpha when eye is steady
const FAST_THRESH = 60; // px — distance threshold

// Affine calibration model
// Maps smoothed WebGazer (rx,ry) → screen (px,py)
// px = ax·rx + bx·ry + cx
// py = ay·rx + by·ry + cy
let CAL = null; // null until computed

// Calibration training data
let calPts = []; // [{sx,sy,rx,ry}]

let wgReady = false;

/* WebGazer smoothing listener */
function onGaze(data) {
  if (!data) return;
  const dx = data.x - wgSmooth.x;
  const dy = data.y - wgSmooth.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const alpha = dist > FAST_THRESH ? S_FAST : S_SLOW;
  wgSmooth.x += alpha * (data.x - wgSmooth.x);
  wgSmooth.y += alpha * (data.y - wgSmooth.y);
  wgRaw.x = data.x;
  wgRaw.y = data.y;
}

/* Apply affine calibration */
function applyCAL(rx, ry) {
  if (!CAL) return { x: rx, y: ry };
  return {
    x: CAL.ax*rx + CAL.bx*ry + CAL.cx,
    y: CAL.ay*rx + CAL.by*ry + CAL.cy,
  };
}

/* Get final gaze position */
function getGaze() {
  const g = applyCAL(wgSmooth.x, wgSmooth.y);
  // Soft clamp (allow slightly out-of-bounds)
  g.x = Math.max(-20, Math.min(innerWidth+20,  g.x));
  g.y = Math.max(-20, Math.min(innerHeight+20, g.y));
  return g;
}

/* ─── Least-squares affine fit ─── */
// Solves Ax=b where A is 3×3 via Gaussian elimination
function solve3(A, b) {
  const M = A.map(r=>[...r]);
  const v = [...b];
  for (let c=0; c<3; c++) {
    // Partial pivot
    let best = c;
    for (let r=c+1; r<3; r++) if (Math.abs(M[r][c])>Math.abs(M[best][c])) best=r;
    [M[c],M[best]]=[M[best],M[c]]; [v[c],v[best]]=[v[best],v[c]];
    if (Math.abs(M[c][c])<1e-12) return null;
    for (let r=c+1; r<3; r++) {
      const f=M[r][c]/M[c][c];
      for (let k=c;k<3;k++) M[r][k]-=f*M[c][k];
      v[r]-=f*v[c];
    }
  }
  const x=[0,0,0];
  for (let i=2;i>=0;i--) {
    x[i]=v[i];
    for (let j=i+1;j<3;j++) x[i]-=M[i][j]*x[j];
    x[i]/=M[i][i];
  }
  return x;
}

function fitAffine(pts) {
  // Need ≥3 non-degenerate points
  if (pts.length < 3) return null;

  // Build normal equations: A^T·A · coeffs = A^T·b
  // row = [rx, ry, 1], target = [sx] or [sy]
  const ATA = [[0,0,0],[0,0,0],[0,0,0]];
  const bX  = [0,0,0];
  const bY  = [0,0,0];

  for (const p of pts) {
    const row = [p.rx, p.ry, 1];
    for (let i=0;i<3;i++) {
      bX[i] += row[i]*p.sx;
      bY[i] += row[i]*p.sy;
      for (let j=0;j<3;j++) ATA[i][j] += row[i]*row[j];
    }
  }

  const cx = solve3(ATA, bX);
  const cy = solve3(ATA, bY);
  if (!cx||!cy) return null;

  const model = { ax:cx[0],bx:cx[1],cx:cx[2], ay:cy[0],by:cy[1],cy:cy[2] };

  // Log residuals for debugging
  let totalErr=0;
  for (const p of pts) {
    const px=model.ax*p.rx+model.bx*p.ry+model.cx;
    const py=model.ay*p.rx+model.by*p.ry+model.cy;
    totalErr+=Math.hypot(px-p.sx,py-p.sy);
  }
  console.log('[CAL] affine residual:', (totalErr/pts.length).toFixed(1)+'px', model);
  return model;
}

/* Trimmed mean — removes top/bottom 15% outliers */
function trimMean(arr, trim=0.15) {
  if (!arr.length) return 0;
  const sorted=[...arr].sort((a,b)=>a-b);
  const cut=Math.floor(sorted.length*trim);
  const mid=sorted.slice(cut, sorted.length-cut);
  return mid.length ? mid.reduce((s,v)=>s+v,0)/mid.length : sorted[Math.floor(sorted.length/2)];
}

/* ════════════════════════════════════════════════════════
   WEBGAZER INITIALISATION
════════════════════════════════════════════════════════ */
let wgStarted = false;

async function startWG() {
  if (wgStarted) return;
  wgStarted = true;
  try {
    webgazer.setGazeListener(onGaze);
    await webgazer
      .setRegression('ridge')
      .setTracker('TFFacemesh')
      .begin();
    // Hide every element WebGazer injects into the DOM
    webgazer.showVideoPreview(false);
    webgazer.showPredictionPoints(false);
    hideWGElements();
    wgReady = true;
  } catch(e) {
    console.warn('WebGazer failed, touch fallback active', e);
    wgReady = false;
    enableTouchFallback();
  }
}

function hideWGElements() {
  // Repeatedly nuke webgazer's injected DOM — it re-injects on resize etc.
  const kill = () => {
    document.querySelectorAll(
      '#webgazerVideoFeed, #webgazerVideoCanvas, #webgazerFaceOverlay, #webgazerGazeDot'
    ).forEach(n => {
      n.style.cssText='position:fixed!important;left:-9999px!important;top:-9999px!important;width:1px!important;height:1px!important;opacity:0!important;pointer-events:none!important;';
    });
    // Also nuke any canvas webgazer adds to body with high z-index
    document.querySelectorAll('body > canvas').forEach(c => {
      if (c.id!=='cal-canvas') c.style.cssText='display:none!important;';
    });
    document.querySelectorAll('body > video').forEach(v => {
      v.style.cssText='position:fixed!important;left:-9999px!important;top:-9999px!important;width:1px!important;height:1px!important;opacity:0!important;pointer-events:none!important;';
    });
  };
  kill();
  setInterval(kill, 800);
}

function enableTouchFallback() {
  // Simulate gaze from touch/mouse (for testing on desktop or when cam denied)
  const update = (x,y) => { wgSmooth.x=wgRaw.x=x; wgSmooth.y=wgRaw.y=y; };
  document.addEventListener('touchmove', e=>{e.preventDefault();const t=e.touches[0];update(t.clientX,t.clientY);},{passive:false});
  document.addEventListener('touchstart',e=>{const t=e.touches[0];update(t.clientX,t.clientY);},{passive:true});
  document.addEventListener('mousemove', e=>update(e.clientX,e.clientY));
}

/* ════════════════════════════════════════════════════════
   GLOBAL GAZE DOT — runs every rAF after calibration done
════════════════════════════════════════════════════════ */
let gazeLoopRunning = false;
let _gazeDanger = false;

function startGazeDot() {
  const dot = el('gaze-dot');
  dot.style.display = 'block';
  if (gazeLoopRunning) return;
  gazeLoopRunning = true;
  const loop = () => {
    const g = getGaze();
    gaze.x = g.x; gaze.y = g.y;
    dot.style.left = g.x + 'px';
    dot.style.top  = g.y + 'px';
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
}

/* ════════════════════════════════════════════════════════
   CALIBRATION
   5 targets. Each: 2s of watching, then 1.5s collecting samples.
   Fitting: affine via least-squares on per-point trimmed means.
════════════════════════════════════════════════════════ */
const CAL_WAIT_MS    = 2000; // ms to stare before collecting
const CAL_COLLECT_MS = 1500; // ms of collection
const CAL_TARGETS = () => {
  const W=innerWidth, H=innerHeight;
  return [
    {x:W*.5,  y:H*.5,  name:'중앙'},
    {x:W*.5,  y:H*.1,  name:'상단'},
    {x:W*.5,  y:H*.9,  name:'하단'},
    {x:W*.15, y:H*.5,  name:'왼쪽'},
    {x:W*.85, y:H*.5,  name:'오른쪽'},
  ];
};

let calTargets=[], calIdx=0, calPhase='wait', calT0=0, calBuf=[];
let calRAF=null, calCanvas, calCtx;

function beginCalibration() {
  calPts=[];
  calTargets=CAL_TARGETS();
  calIdx=0; calPhase='wait'; calT0=0; calBuf=[];
  CAL=null;

  calCanvas=el('cal-canvas');
  calCanvas.width=innerWidth;
  calCanvas.height=innerHeight;
  calCtx=calCanvas.getContext('2d');

  show('cal');
  cancelAnimationFrame(calRAF);
  calFrame(performance.now());
}

function calFrame(now) {
  const W=calCanvas.width, H=calCanvas.height;
  calCtx.clearRect(0,0,W,H);

  // Background
  calCtx.fillStyle='#000';
  calCtx.fillRect(0,0,W,H);

  const tgt=calTargets[calIdx];

  // ── Progress pips ──
  const N=calTargets.length;
  const PIP_R=5, PIP_GAP=18;
  const px0=W/2-(N-1)*PIP_GAP/2;
  for(let i=0;i<N;i++){
    calCtx.beginPath();
    calCtx.arc(px0+i*PIP_GAP, 28, PIP_R, 0, Math.PI*2);
    calCtx.fillStyle = i<calIdx ? '#00ff88' : i===calIdx ? '#ff1e3c' : '#111';
    calCtx.fill();
  }

  // ── Step label ──
  calCtx.textAlign='center';
  calCtx.font='700 11px Orbitron,monospace';
  calCtx.fillStyle='#222';
  calCtx.fillText(`STEP ${calIdx+1} / ${N}`, W/2, 48);

  // ── Phase: WAIT ──
  if(calPhase==='wait'){
    if(!calT0) calT0=now;
    const elapsed=now-calT0;
    const remain=Math.max(0,CAL_WAIT_MS-elapsed);
    const prog=elapsed/CAL_WAIT_MS;

    drawTarget(tgt.x, tgt.y, 'wait', prog, performance.now());

    // Countdown number below target
    calCtx.font=`900 ${Math.round(H*.1)}px Orbitron,monospace`;
    calCtx.fillStyle=`rgba(255,255,255,${.12+.2*(1-prog)})`;
    calCtx.fillText(Math.ceil(remain/1000)||'→', W/2, H*.75);

    // Instruction
    calCtx.font='400 14px Noto Sans KR,sans-serif';
    calCtx.fillStyle='#555';
    calCtx.fillText(`"${tgt.name}" 빨간 점을 바라봐 주세요`, W/2, H-50);

    if(elapsed>=CAL_WAIT_MS){
      calPhase='collect'; calT0=now; calBuf=[];
      if(wgReady) webgazer.recordScreenPosition(tgt.x,tgt.y,'click');
    }

  // ── Phase: COLLECT ──
  } else if(calPhase==='collect'){
    const elapsed=now-calT0;
    const prog=Math.min(elapsed/CAL_COLLECT_MS,1);

    // Accumulate samples
    calBuf.push({rx:wgSmooth.x, ry:wgSmooth.y});
    if(wgReady) webgazer.recordScreenPosition(tgt.x,tgt.y,'move');

    drawTarget(tgt.x, tgt.y, 'collect', prog, performance.now());

    calCtx.font='700 13px Noto Sans KR,sans-serif';
    calCtx.fillStyle='#00ff88';
    calCtx.fillText('시선 유지 중…', W/2, H*.75);

    calCtx.font='400 12px Noto Sans KR,sans-serif';
    calCtx.fillStyle='#222';
    calCtx.fillText(`${calBuf.length}샘플 수집`, W/2, H-50);

    if(elapsed>=CAL_COLLECT_MS){
      // Save trimmed-mean point
      const avgRx=trimMean(calBuf.map(s=>s.rx));
      const avgRy=trimMean(calBuf.map(s=>s.ry));
      calPts.push({sx:tgt.x,sy:tgt.y,rx:avgRx,ry:avgRy});
      console.log(`[CAL] pt${calIdx}: screen(${tgt.x|0},${tgt.y|0}) raw(${avgRx|0},${avgRy|0})`);

      calIdx++;
      if(calIdx>=calTargets.length){
        // Done — fit model
        CAL=fitAffine(calPts);
        finishCalibration();
        return;
      }
      calPhase='wait'; calT0=0; calBuf=[];
    }
  }

  // Update gaze dot during calibration
  const g=getGaze();
  gaze.x=g.x; gaze.y=g.y;
  const dot=el('gaze-dot');
  dot.style.left=g.x+'px';
  dot.style.top=g.y+'px';

  calRAF=requestAnimationFrame(calFrame);
}

function drawTarget(x, y, phase, prog, now) {
  const ctx=calCtx;

  if(phase==='wait'){
    // Pulsing red dot
    const pulse=.7+.3*Math.sin(now/400*Math.PI);

    // Outer halo
    const g=ctx.createRadialGradient(x,y,0,x,y,60*pulse);
    g.addColorStop(0,'rgba(255,30,60,.18)');
    g.addColorStop(1,'rgba(255,30,60,0)');
    ctx.beginPath(); ctx.arc(x,y,60*pulse,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();

    // Main circle
    ctx.beginPath(); ctx.arc(x,y,14,0,Math.PI*2);
    ctx.fillStyle='#ff1e3c'; ctx.fill();

    // Cross
    ctx.strokeStyle='rgba(255,30,60,.35)'; ctx.lineWidth=1;
    ctx.setLineDash([4,5]);
    ctx.beginPath(); ctx.moveTo(x-44,y); ctx.lineTo(x+44,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-44); ctx.lineTo(x,y+44); ctx.stroke();
    ctx.setLineDash([]);

    // White center
    ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();

  } else {
    // Collecting — green progress ring
    const halo=ctx.createRadialGradient(x,y,0,x,y,48);
    halo.addColorStop(0,'rgba(0,255,136,.12)');
    halo.addColorStop(1,'rgba(0,255,136,0)');
    ctx.beginPath(); ctx.arc(x,y,48,0,Math.PI*2);
    ctx.fillStyle=halo; ctx.fill();

    ctx.beginPath(); ctx.arc(x,y,14,0,Math.PI*2);
    ctx.fillStyle='#ff1e3c'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();

    // Background ring
    ctx.beginPath(); ctx.arc(x,y,26,0,Math.PI*2);
    ctx.strokeStyle='#111'; ctx.lineWidth=5; ctx.stroke();
    // Progress ring
    ctx.beginPath();
    ctx.arc(x,y,26,-Math.PI/2,-Math.PI/2+Math.PI*2*prog);
    ctx.strokeStyle='#00ff88'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
  }
}

function finishCalibration(){
  cancelAnimationFrame(calRAF);
  show('upload');
  startGazeDot(); // start continuous gaze dot from now on
}

/* ════════════════════════════════════════════════════════
   UPLOAD
════════════════════════════════════════════════════════ */
let imageURL=null;

el('up-area').addEventListener('click',()=>el('file-input').click());
el('file-input').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  imageURL=URL.createObjectURL(f);
  const img=new Image(); img.src=imageURL;
  img.onload=()=>{
    el('up-area').innerHTML='';
    el('up-area').appendChild(img);
    el('btn-play').disabled=false;
  };
});
on('btn-recal','click',()=>beginCalibration());

/* ════════════════════════════════════════════════════════
   GAME
════════════════════════════════════════════════════════ */
const REVEAL_MS  = 2000;
const GRACE_MS   = 500;

let gameOn=false, t0Game=0, dangerT=null;
let gameRAF=null, timerIV=null;

on('btn-play','click',startGame);
on('btn-retry','click',()=>{hide();show('game');startGame();});
on('btn-home','click',()=>{show('title');});

function startGame(){
  if(!imageURL) return;
  show('game');
  const img=el('game-img');

  const go=()=>{
    el('mask').style.height='75%';
    gameOn=true;
    t0Game=performance.now();
    dangerT=null;
    el('hud-time').textContent='0.00';
    el('hud-dot').className='';
    clearInterval(timerIV);
    timerIV=setInterval(()=>{
      if(gameOn) el('hud-time').textContent=((performance.now()-t0Game)/1e3).toFixed(2);
    },50);
    cancelAnimationFrame(gameRAF);
    gameRAF=requestAnimationFrame(gameLoop);
  };

  if(img.src===imageURL){ go(); }
  else { img.src=imageURL; img.onload=go; }
}

function gameLoop(now){
  if(!gameOn) return;

  // ── Reveal mask ──
  const elapsed=now-t0Game;
  const coverPct=75*Math.max(0,1-elapsed/REVEAL_MS);
  el('mask').style.height=coverPct+'%';

  // ── Gaze (already updated by startGazeDot loop) ──
  // Re-read from the global gaze object (updated in startGazeDot rAF)
  const gx=gaze.x, gy=gaze.y;

  // Update gaze dot position (in case startGazeDot loop is racing)
  el('gaze-dot').style.left=gx+'px';
  el('gaze-dot').style.top=gy+'px';

  // ── Safe zone check ──
  const vp=el('viewport').getBoundingClientRect();
  const relX=gx-vp.left;
  const relY=gy-vp.top;
  const safeY=vp.height*0.25;
  const inSafe=(relY>=0&&relY<=safeY&&relX>=0&&relX<=vp.width);

  if(inSafe){
    dangerT=null;
    el('hud-dot').className='';
    el('gaze-dot').className='';
    el('flash').className='';
    el('warn').className='';
  } else {
    if(!dangerT) dangerT=now;
    const dElapsed=now-dangerT;
    if(dElapsed>=GRACE_MS){ endGame(elapsed); return; }
    el('hud-dot').className='red';
    el('gaze-dot').className='red';
    el('warn').className='on';
    el('flash').className=Math.floor(dElapsed/110)%2===0?'on':'';
  }

  gameRAF=requestAnimationFrame(gameLoop);
}

function endGame(elapsed){
  gameOn=false;
  cancelAnimationFrame(gameRAF);
  clearInterval(timerIV);
  el('flash').className='';
  el('warn').className='';
  el('gaze-dot').className='';
  el('score-num').textContent=(elapsed/1e3).toFixed(2);
  show('over');
}

/* ════════════════════════════════════════════════════════
   STARTUP FLOW
════════════════════════════════════════════════════════ */
on('btn-begin','click',async()=>{
  el('gaze-dot').style.display='block'; // show early so user sees it loading
  show('cal'); // show cal screen behind loader while WG starts
  el('loader').classList.remove('off'); // keep loader visible

  await startWG();
  // Let face mesh warm up
  await new Promise(r=>setTimeout(r,1400));

  el('loader').classList.add('off');
  beginCalibration();
});

on('btn-retry','click',()=>{ show('game'); startGame(); });
on('btn-home','click',()=>show('title'));

</script>
