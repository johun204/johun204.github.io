<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>👁 EYE LOCK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --red: #ff2244;
    --green: #00ff88;
    --bg: #050508;
    --panel: #0d0d14;
    --border: #1a1a2e;
    --text: #c8c8e0;
    --white: #eeeeff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    transition: opacity .4s;
    gap: 20px;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── TITLE ── */
  #screen-title {
    background: radial-gradient(ellipse at 50% 30%, #0d0d22 0%, #050508 70%);
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.8rem, 14vw, 5rem);
    font-weight: 900;
    color: var(--white);
    letter-spacing: .1em;
    text-shadow: 0 0 30px rgba(255,34,68,.6), 0 0 60px rgba(255,34,68,.3);
    line-height: 1;
  }
  .logo span { color: var(--red); }
  .subtitle {
    font-size: .85rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: #555580;
    margin-top: 4px;
  }
  .rule-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 22px;
    width: 100%;
    max-width: 400px;
    font-size: .82rem;
    line-height: 1.8;
    color: #8888aa;
  }
  .rule-box b { color: var(--text); }
  .rule-box .r { color: var(--red); }

  /* ── BUTTONS ── */
  .btn {
    width: 100%; max-width: 360px;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    letter-spacing: .1em;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    user-select: none;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary {
    background: var(--red);
    color: #fff;
    box-shadow: 0 0 24px rgba(255,34,68,.5);
  }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* ── CALIBRATION ── */
  #screen-calibration {
    background: #000;
    flex-direction: column;
    gap: 0;
  }
  .cal-instruction {
    font-size: .9rem;
    text-align: center;
    color: var(--text);
    padding: 0 20px;
    position: absolute;
    bottom: 80px;
    width: 100%;
  }
  .cal-step-label {
    font-family: 'Orbitron', monospace;
    font-size: .7rem;
    letter-spacing: .2em;
    color: #444466;
    position: absolute;
    bottom: 110px;
    width: 100%;
    text-align: center;
  }
  #cal-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--red);
    position: absolute;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 20px var(--red), 0 0 40px rgba(255,34,68,.4);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    50% { transform: translate(-50%,-50%) scale(1.3); }
  }

  /* ── IMAGE UPLOAD ── */
  #screen-upload {
    gap: 16px;
  }
  .upload-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: .08em;
  }
  .upload-area {
    width: 100%; max-width: 380px;
    height: 200px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color .2s;
    overflow: hidden;
    position: relative;
  }
  .upload-area:active { border-color: var(--red); }
  .upload-area img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 14px;
  }
  .upload-icon { font-size: 2.5rem; }
  .upload-text { font-size: .85rem; color: #555580; }
  #file-input { display: none; }

  /* ── GAME ── */
  #screen-game {
    padding: 0;
    background: #000;
    flex-direction: column;
    justify-content: flex-start;
    gap: 0;
  }
  #game-hud {
    width: 100%;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 10;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(8px);
  }
  #timer-display {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 16px rgba(0,255,136,.5);
  }
  #zone-bar {
    font-size: .7rem;
    letter-spacing: .15em;
    color: #444466;
    text-transform: uppercase;
  }
  #status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }
  #status-dot.danger { background: var(--red); box-shadow: 0 0 8px var(--red); animation: blink .2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  #game-viewport {
    flex: 1;
    width: 100%;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  #game-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    position: absolute;
    top: 0; left: 0;
  }
  #cover-black {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: #000;
    transition: height .05s linear;
    z-index: 2;
  }
  #safe-zone-line {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: rgba(255,34,68,.6);
    z-index: 3;
    top: 25%;
  }
  #safe-zone-bg {
    position: absolute;
    left: 0; right: 0;
    top: 0; height: 25%;
    background: rgba(255,34,68,.06);
    border-bottom: 1px solid rgba(255,34,68,.2);
    z-index: 3;
    pointer-events: none;
  }
  #gaze-cursor {
    position: absolute;
    width: 28px; height: 28px;
    border: 2px solid var(--green);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
    transition: border-color .1s;
    box-shadow: 0 0 10px rgba(0,255,136,.4);
  }
  #gaze-cursor::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    transform: translate(-50%,-50%);
  }
  #gaze-cursor.danger { border-color: var(--red); box-shadow: 0 0 10px rgba(255,34,68,.6); }
  #gaze-cursor.danger::after { background: var(--red); }

  /* ── GAMEOVER ── */
  #screen-gameover {
    gap: 16px;
    background: radial-gradient(ellipse at 50% 40%, #1a0008 0%, #050508 70%);
  }
  .go-label {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 10vw, 3rem);
    font-weight: 900;
    color: var(--red);
    text-shadow: 0 0 30px rgba(255,34,68,.8);
    letter-spacing: .1em;
  }
  .go-sublabel {
    font-size: .8rem;
    letter-spacing: .2em;
    color: #555580;
    text-transform: uppercase;
  }
  .score-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 40px;
    text-align: center;
    width: 100%;
    max-width: 340px;
  }
  .score-time {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.5rem, 16vw, 5rem);
    font-weight: 900;
    color: var(--white);
    line-height: 1;
  }
  .score-unit {
    font-size: .75rem;
    letter-spacing: .2em;
    color: #555580;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── VIDEO (hidden) ── */
  #webcam { display: none; }

  /* ── FLASH overlay ── */
  #flash {
    position: fixed; inset: 0;
    background: var(--red);
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity .1s;
  }
  #flash.on { opacity: .35; }

  /* ── WARNING overlay ── */
  #warning-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 10px;
    text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: .7rem;
    letter-spacing: .2em;
    background: var(--red);
    color: #fff;
    z-index: 50;
    transform: translateY(-100%);
    transition: transform .2s;
  }
  #warning-bar.show { transform: translateY(0); }
</style>
</head>
<body>

<video id="webcam" playsinline autoplay muted></video>
<div id="flash"></div>
<div id="warning-bar">⚠ 시선이 이탈했습니다!</div>

<!-- ── TITLE ── -->
<div class="screen" id="screen-title">
  <div style="text-align:center">
    <div class="logo">EYE<span>LOCK</span></div>
    <div class="subtitle">눈을 떼지 마라</div>
  </div>
  <div class="rule-box">
    <b>게임 방법</b><br>
    1. 시선 보정 → 사진 업로드 → 게임 시작<br>
    2. 사진이 아래로 서서히 드러납니다<br>
    3. <span class="r">시선을 위 25% 영역</span>에 유지하세요<br>
    4. 0.5초 이상 이탈 시 게임오버<br>
    5. 얼마나 버틸 수 있나요?
  </div>
  <button class="btn btn-primary" id="btn-start-flow">시작하기</button>
</div>

<!-- ── CALIBRATION ── -->
<div class="screen hidden" id="screen-calibration">
  <div id="cal-dot"></div>
  <div class="cal-step-label" id="cal-step-label">STEP 1 / 3</div>
  <div class="cal-instruction" id="cal-instruction">화면 중앙의 빨간 점을 바라봐 주세요</div>
</div>

<!-- ── UPLOAD ── -->
<div class="screen hidden" id="screen-upload">
  <div class="upload-title">사진 선택</div>
  <div class="upload-area" id="upload-area">
    <span class="upload-icon">📷</span>
    <span class="upload-text">탭하여 사진 선택</span>
  </div>
  <input type="file" id="file-input" accept="image/*">
  <button class="btn btn-primary" id="btn-play" disabled>게임 시작</button>
  <button class="btn btn-secondary" id="btn-recal">시선 재보정</button>
</div>

<!-- ── GAME ── -->
<div class="screen hidden" id="screen-game">
  <div id="game-hud">
    <div id="timer-display">0.00</div>
    <div id="zone-bar">SAFE ZONE: TOP 25%</div>
    <div id="status-dot"></div>
  </div>
  <div id="game-viewport">
    <img id="game-image" src="" alt="">
    <div id="cover-black"></div>
    <div id="safe-zone-bg"></div>
    <div id="safe-zone-line"></div>
    <div id="gaze-cursor"></div>
  </div>
</div>

<!-- ── GAMEOVER ── -->
<div class="screen hidden" id="screen-gameover">
  <div class="go-label">GAME OVER</div>
  <div class="go-sublabel">시선 이탈 감지됨</div>
  <div class="score-box">
    <div class="score-time" id="final-time">0.00</div>
    <div class="score-unit">초 버팀</div>
  </div>
  <button class="btn btn-primary" id="btn-retry">다시 도전</button>
  <button class="btn btn-secondary" id="btn-home">처음으로</button>
</div>

<!-- WebGazer CDN -->
<script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

<script>
/* ─────────────── UTILS ─────────────── */
const $ = id => document.getElementById(id);
const show = id => $('screen-'+id).classList.remove('hidden');
const hide = id => $('screen-'+id).classList.add('hidden');

/* ─────────────── STATE ─────────────── */
let calData = []; // [{x,y, gazeX, gazeY}] for 3 points
let imageURL = null;
let gazeX = 0, gazeY = 0;
let gameRunning = false;
let gameStartTime = 0;
let coverHeight = 0; // 0 = fully revealed, 100 = fully covered
let viewportH = 0;
let dangerStart = null; // timestamp when gaze left safe zone
let DANGER_GRACE = 500; // ms
let REVEAL_DURATION = 2000; // ms
let calOffset = { dx: 0, dy: 0, scaleX: 1, scaleY: 1 };
let animFrame;
let gameTimerInterval;

/* ─────────────── WEBGAZER ─────────────── */
let webgazerReady = false;
let rawGaze = { x: window.innerWidth/2, y: window.innerHeight/2 };

async function initWebgazer() {
  try {
    webgazer.setGazeListener((data, elapsed) => {
      if (data) {
        rawGaze.x = data.x;
        rawGaze.y = data.y;
      }
    });
    await webgazer
      .setRegression('ridge')
      .setTracker('TFFacemesh')
      .begin();
    webgazer.showVideoPreview(false);
    webgazer.showPredictionPoints(false);
    webgazerReady = true;
  } catch(e) {
    console.warn('WebGazer failed:', e);
    // Fallback: use device orientation or touch
    webgazerReady = false;
    enableFallback();
  }
}

function enableFallback() {
  // On failure, use touch/mouse as gaze proxy
  document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    rawGaze.x = t.clientX;
    rawGaze.y = t.clientY;
  }, { passive: true });
  document.addEventListener('mousemove', e => {
    rawGaze.x = e.clientX;
    rawGaze.y = e.clientY;
  });
}

function getCalibratedGaze() {
  // Apply calibration offset
  if (calData.length < 3) return rawGaze;
  // Simple affine: just use the middle calibration point offset
  const cx = rawGaze.x + calOffset.dx;
  const cy = rawGaze.y + calOffset.dy;
  return { x: cx, y: cy };
}

/* ─────────────── CALIBRATION ─────────────── */
const calSteps = [
  { label: 'STEP 1 / 3', text: '화면 중앙의 빨간 점을 바라봐 주세요', pos: () => ({ x: window.innerWidth/2, y: window.innerHeight/2 }) },
  { label: 'STEP 2 / 3', text: '화면 상단의 빨간 점을 바라봐 주세요', pos: () => ({ x: window.innerWidth/2, y: window.innerHeight*0.1 }) },
  { label: 'STEP 3 / 3', text: '화면 하단의 빨간 점을 바라봐 주세요', pos: () => ({ x: window.innerWidth/2, y: window.innerHeight*0.9 }) },
];
let calStepIdx = 0;
let calTimeout = null;

function startCalibration() {
  calData = [];
  calStepIdx = 0;
  show('calibration');
  runCalStep();
}

function runCalStep() {
  const step = calSteps[calStepIdx];
  const pos = step.pos();
  const dot = $('cal-dot');
  dot.style.left = pos.x + 'px';
  dot.style.top = pos.y + 'px';
  $('cal-step-label').textContent = step.label;
  $('cal-instruction').textContent = step.text;

  // Let user look for 1.5s, then record gaze
  calTimeout = setTimeout(() => {
    // Record gaze at this screen position
    // webgazer click-train: simulate a click to help it calibrate
    if (webgazerReady) {
      webgazer.recordScreenPosition(pos.x, pos.y, 'click');
    }
    calData.push({ screenX: pos.x, screenY: pos.y, gazeX: rawGaze.x, gazeY: rawGaze.y });

    calStepIdx++;
    if (calStepIdx < calSteps.length) {
      runCalStep();
    } else {
      computeCalibration();
      hide('calibration');
      show('upload');
    }
  }, 2000);
}

function computeCalibration() {
  if (calData.length < 3) { calOffset = { dx: 0, dy: 0 }; return; }
  // Use center point to compute simple offset
  const center = calData[0];
  calOffset.dx = center.screenX - center.gazeX;
  calOffset.dy = center.screenY - center.gazeY;
}

/* ─────────────── UPLOAD ─────────────── */
$('upload-area').addEventListener('click', () => $('file-input').click());
$('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  imageURL = url;
  const img = document.createElement('img');
  img.src = url;
  $('upload-area').innerHTML = '';
  $('upload-area').appendChild(img);
  $('btn-play').disabled = false;
});

$('btn-recal').addEventListener('click', () => {
  hide('upload');
  startCalibration();
});

/* ─────────────── GAME ─────────────── */
$('btn-play').addEventListener('click', startGame);
$('btn-retry').addEventListener('click', () => {
  hide('gameover');
  startGame();
});
$('btn-home').addEventListener('click', () => {
  hide('gameover');
  show('title');
});

function startGame() {
  if (!imageURL) return;
  show('game');
  hide('upload');
  hide('gameover');

  const gameImg = $('game-image');
  gameImg.src = imageURL;
  gameImg.onload = () => {
    viewportH = $('game-viewport').offsetHeight;
    $('cover-black').style.height = '75%'; // start: show only top 25%
    $('safe-zone-line').style.top = '25%';
    $('safe-zone-bg').style.height = '25%';

    gameRunning = true;
    gameStartTime = performance.now();
    dangerStart = null;
    coverHeight = 75; // percentage covered

    $('timer-display').textContent = '0.00';
    $('gaze-cursor').style.opacity = '1';

    gameLoop();
    gameTimerInterval = setInterval(updateTimer, 50);
  };
}

function updateTimer() {
  if (!gameRunning) return;
  const elapsed = (performance.now() - gameStartTime) / 1000;
  $('timer-display').textContent = elapsed.toFixed(2);
}

function gameLoop() {
  if (!gameRunning) return;

  const now = performance.now();
  const elapsed = now - gameStartTime;

  // Reveal: coverHeight goes from 75% to 0% over REVEAL_DURATION ms
  const revealProgress = Math.min(elapsed / REVEAL_DURATION, 1);
  const newCover = 75 * (1 - revealProgress);
  $('cover-black').style.height = newCover + '%';

  // Calibrated gaze
  const g = getCalibratedGaze();
  gazeX = g.x;
  gazeY = g.y;

  // Map gaze to game viewport
  const vp = $('game-viewport').getBoundingClientRect();
  const relX = gazeX - vp.left;
  const relY = gazeY - vp.top;

  // Clamp cursor for display
  const cx = Math.max(0, Math.min(vp.width, relX));
  const cy = Math.max(0, Math.min(vp.height, relY));
  const cursor = $('gaze-cursor');
  cursor.style.left = cx + 'px';
  cursor.style.top = cy + 'px';

  // Safe zone: top 25% of viewport
  const safeLimit = vp.height * 0.25;
  const inSafe = relY <= safeLimit && relY >= 0 && relX >= 0 && relX <= vp.width;

  const statusDot = $('status-dot');
  if (inSafe) {
    dangerStart = null;
    statusDot.className = '';
    cursor.className = '';
    $('warning-bar').classList.remove('show');
    $('flash').classList.remove('on');
  } else {
    if (!dangerStart) dangerStart = now;
    const dangerElapsed = now - dangerStart;
    if (dangerElapsed >= DANGER_GRACE) {
      gameOver();
      return;
    }
    // Warning state
    statusDot.className = 'danger';
    cursor.className = 'danger';
    $('warning-bar').classList.add('show');
    // Pulse flash
    if (Math.floor(dangerElapsed / 100) % 2 === 0) {
      $('flash').classList.add('on');
    } else {
      $('flash').classList.remove('on');
    }
  }

  animFrame = requestAnimationFrame(gameLoop);
}

function gameOver() {
  gameRunning = false;
  cancelAnimationFrame(animFrame);
  clearInterval(gameTimerInterval);

  const elapsed = (performance.now() - gameStartTime) / 1000;
  $('flash').classList.remove('on');
  $('warning-bar').classList.remove('show');
  $('gaze-cursor').style.opacity = '0';

  $('final-time').textContent = elapsed.toFixed(2);
  hide('game');
  show('gameover');
}

/* ─────────────── FLOW ─────────────── */
$('btn-start-flow').addEventListener('click', async () => {
  hide('title');
  // Start webcam + webgazer
  await initWebgazer();
  startCalibration();
});

</script>
</body>
</html>
