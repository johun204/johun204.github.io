<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>👁 EYE LOCK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');
:root{--red:#ff2244;--green:#00ff88;--bg:#050508;--panel:#0d0d14;--border:#1a1a2e;--text:#c8c8e0;--white:#eeeeff;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;touch-action:none;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:18px;transition:opacity .3s;}
.screen.hidden{opacity:0;pointer-events:none;}

/* TITLE */
#screen-title{background:radial-gradient(ellipse at 50% 30%,#0d0d22 0%,#050508 70%);}
.logo{font-family:'Orbitron',monospace;font-size:clamp(2.8rem,14vw,5rem);font-weight:900;color:var(--white);letter-spacing:.1em;text-shadow:0 0 30px rgba(255,34,68,.6),0 0 60px rgba(255,34,68,.3);line-height:1;}
.logo span{color:var(--red);}
.subtitle{font-size:.8rem;letter-spacing:.25em;text-transform:uppercase;color:#555580;margin-top:4px;}
.rule-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px 20px;width:100%;max-width:400px;font-size:.82rem;line-height:1.85;color:#8888aa;}
.rule-box b{color:var(--text);}.rule-box .r{color:var(--red);}

/* BUTTONS */
.btn{width:100%;max-width:360px;padding:15px;border-radius:12px;border:none;font-size:.95rem;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:transform .15s,box-shadow .15s;user-select:none;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--red);color:#fff;box-shadow:0 0 24px rgba(255,34,68,.4);}
.btn-success{background:var(--green);color:#000;box-shadow:0 0 24px rgba(0,255,136,.35);}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn:disabled{opacity:.35;pointer-events:none;}

/* CALIBRATION */
#screen-calibration{background:#050508;padding:0;}
#cal-canvas{position:absolute;inset:0;width:100%;height:100%;}

/* GAZE CURSOR — global floating */
#gaze-dot{
  position:fixed;
  width:38px;height:38px;
  border-radius:50%;
  border:2.5px solid var(--green);
  pointer-events:none;
  z-index:9999;
  display:none;
  transform:translate(-50%,-50%);
  box-shadow:0 0 14px rgba(0,255,136,.5);
  transition:left .04s linear,top .04s linear,border-color .15s;
}
#gaze-dot::after{
  content:'';position:absolute;top:50%;left:50%;
  width:8px;height:8px;background:var(--green);
  border-radius:50%;transform:translate(-50%,-50%);
  transition:background .15s;
}
#gaze-dot.danger{border-color:var(--red);box-shadow:0 0 14px rgba(255,34,68,.6);}
#gaze-dot.danger::after{background:var(--red);}

/* UPLOAD */
#screen-upload{gap:14px;}
.upload-title{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:var(--white);letter-spacing:.08em;}
.upload-area{width:100%;max-width:380px;height:180px;border:2px dashed var(--border);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;overflow:hidden;position:relative;transition:border-color .2s;}
.upload-area:active{border-color:var(--red);}
.upload-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.upload-icon{font-size:2.2rem;}
.upload-text{font-size:.82rem;color:#555580;}
#file-input{display:none;}

/* GAME */
#screen-game{padding:0;background:#000;flex-direction:column;justify-content:flex-start;}
#game-hud{width:100%;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;z-index:10;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);}
#timer-display{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:700;color:var(--green);text-shadow:0 0 14px rgba(0,255,136,.5);}
#zone-bar{font-size:.62rem;letter-spacing:.12em;color:#444466;text-transform:uppercase;}
#status-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
#status-dot.danger{background:var(--red);box-shadow:0 0 8px var(--red);animation:blink .2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#game-viewport{flex:1;width:100%;position:relative;overflow:hidden;background:#000;}
#game-image{width:100%;height:100%;object-fit:cover;display:block;position:absolute;top:0;left:0;}
#cover-black{position:absolute;left:0;right:0;bottom:0;background:#000;z-index:2;}
#safe-zone-line{position:absolute;left:0;right:0;height:2px;background:rgba(255,34,68,.7);z-index:3;top:25%;}
#safe-zone-bg{position:absolute;left:0;right:0;top:0;height:25%;background:rgba(255,34,68,.07);border-bottom:1px solid rgba(255,34,68,.25);z-index:3;pointer-events:none;}

/* GAMEOVER */
#screen-gameover{gap:14px;background:radial-gradient(ellipse at 50% 40%,#1a0008 0%,#050508 70%);}
.go-label{font-family:'Orbitron',monospace;font-size:clamp(1.8rem,10vw,3rem);font-weight:900;color:var(--red);text-shadow:0 0 30px rgba(255,34,68,.8);letter-spacing:.1em;}
.go-sublabel{font-size:.75rem;letter-spacing:.2em;color:#555580;text-transform:uppercase;}
.score-box{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:24px 40px;text-align:center;width:100%;max-width:320px;}
.score-time{font-family:'Orbitron',monospace;font-size:clamp(2.5rem,16vw,5rem);font-weight:900;color:var(--white);line-height:1;}
.score-unit{font-size:.72rem;letter-spacing:.2em;color:#555580;margin-top:6px;text-transform:uppercase;}

/* FLASH / WARNING */
#flash{position:fixed;inset:0;background:var(--red);opacity:0;pointer-events:none;z-index:200;transition:opacity .1s;}
#flash.on{opacity:.3;}
#warning-bar{position:fixed;top:0;left:0;right:0;padding:9px;text-align:center;font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:.18em;background:var(--red);color:#fff;z-index:150;transform:translateY(-100%);transition:transform .2s;}
#warning-bar.show{transform:translateY(0);}

/* WEBCAM — hidden but active for WebGazer face tracking */
video{position:fixed!important;left:-9999px!important;top:-9999px!important;width:1px!important;height:1px!important;opacity:0!important;pointer-events:none!important;}
</style>
</head>
<body>

<div id="flash"></div>
<div id="warning-bar">⚠ 시선 이탈 — 위를 봐주세요!</div>
<div id="gaze-dot"></div>

<!-- TITLE -->
<div class="screen" id="screen-title">
  <div style="text-align:center">
    <div class="logo">EYE<span>LOCK</span></div>
    <div class="subtitle">눈을 떼지 마라</div>
  </div>
  <div class="rule-box">
    <b>게임 방법</b><br>
    1. 시선 보정 (5포인트) → 사진 선택 → 시작<br>
    2. 사진이 2초에 걸쳐 아래로 드러납니다<br>
    3. <span class="r">시선을 상단 25% 안에 유지</span>하세요<br>
    4. 0.5초 이상 이탈 시 게임오버<br>
    5. <span style="color:var(--green)">●</span> 녹색 원 = 현재 내 시선 위치
  </div>
  <button class="btn btn-primary" id="btn-start-flow">시작하기</button>
</div>

<!-- CALIBRATION -->
<div class="screen hidden" id="screen-calibration">
  <canvas id="cal-canvas"></canvas>
</div>

<!-- UPLOAD -->
<div class="screen hidden" id="screen-upload">
  <div class="upload-title">사진 선택</div>
  <div class="upload-area" id="upload-area">
    <span class="upload-icon">📷</span>
    <span class="upload-text">탭하여 앨범에서 사진 선택</span>
  </div>
  <input type="file" id="file-input" accept="image/*">
  <button class="btn btn-success" id="btn-play" disabled>게임 시작</button>
  <button class="btn btn-secondary" id="btn-recal">시선 재보정</button>
</div>

<!-- GAME -->
<div class="screen hidden" id="screen-game">
  <div id="game-hud">
    <div id="timer-display">0.00</div>
    <div id="zone-bar">SAFE ZONE · TOP 25%</div>
    <div id="status-dot"></div>
  </div>
  <div id="game-viewport">
    <img id="game-image" src="" alt="">
    <div id="cover-black"></div>
    <div id="safe-zone-bg"></div>
    <div id="safe-zone-line"></div>
  </div>
</div>

<!-- GAMEOVER -->
<div class="screen hidden" id="screen-gameover">
  <div class="go-label">GAME OVER</div>
  <div class="go-sublabel">시선 이탈 감지됨</div>
  <div class="score-box">
    <div class="score-time" id="final-time">0.00</div>
    <div class="score-unit">초 버팀</div>
  </div>
  <button class="btn btn-primary" id="btn-retry">다시 도전</button>
  <button class="btn btn-secondary" id="btn-home">처음으로</button>
</div>

<script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
<script>
/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
const $ = id => document.getElementById(id);
const show = id => $('screen-'+id).classList.remove('hidden');
const hide = id => $('screen-'+id).classList.add('hidden');

/* ══════════════════════════════════════
   GAZE STATE
══════════════════════════════════════ */
// Raw output from WebGazer
let rawGaze = { x: window.innerWidth/2, y: window.innerHeight/2 };

// Exponential moving average smoothing
let smoothGaze = { x: window.innerWidth/2, y: window.innerHeight/2 };

// Larger alpha = more responsive, smaller = smoother
// We use two-stage: fast when moving a lot, slow otherwise
const ALPHA_FAST = 0.35;
const ALPHA_SLOW = 0.15;

// Affine calibration coefficients (fitted via least-squares)
// px = ax*rx + bx*ry + cx
// py = ay*rx + by*ry + cy
let affine = null;

// Raw calibration data collected during calibration steps
let calPoints = []; // [{sx, sy, rx, ry}]

let webgazerReady = false;
let imageURL = null;

/* ══════════════════════════════════════
   WEBGAZER INIT
══════════════════════════════════════ */
async function initWebgazer() {
  try {
    webgazer.setGazeListener((data) => {
      if (!data) return;
      const dx = data.x - smoothGaze.x;
      const dy = data.y - smoothGaze.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      // Adaptive smoothing: fast when far, slow when near
      const alpha = dist > 80 ? ALPHA_FAST : ALPHA_SLOW;
      smoothGaze.x += alpha * (data.x - smoothGaze.x);
      smoothGaze.y += alpha * (data.y - smoothGaze.y);
      rawGaze.x = data.x;
      rawGaze.y = data.y;
    });

    await webgazer
      .setRegression('ridge')
      .setTracker('TFFacemesh')
      .begin();

    webgazer.showVideoPreview(false);
    webgazer.showPredictionPoints(false);

    // Force all video elements off-screen
    setTimeout(() => {
      document.querySelectorAll('video').forEach(v => {
        v.style.cssText = 'position:fixed!important;left:-9999px!important;top:-9999px!important;width:1px!important;height:1px!important;opacity:0!important;';
      });
    }, 500);

    webgazerReady = true;
    console.log('WebGazer ready');
  } catch(e) {
    console.warn('WebGazer init failed, using fallback:', e);
    webgazerReady = false;
    enableFallback();
  }
}

// Touch/mouse fallback for testing or when camera is unavailable
function enableFallback() {
  document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    smoothGaze.x = rawGaze.x = t.clientX;
    smoothGaze.y = rawGaze.y = t.clientY;
  }, { passive:true });
  document.addEventListener('mousemove', e => {
    smoothGaze.x = rawGaze.x = e.clientX;
    smoothGaze.y = rawGaze.y = e.clientY;
  });
}

/* ══════════════════════════════════════
   CALIBRATION — 5 POINT AFFINE
══════════════════════════════════════ */
function getCalTargets() {
  const W = window.innerWidth, H = window.innerHeight;
  return [
    { x: W*0.5, y: H*0.5,  label:'화면 중앙' },
    { x: W*0.5, y: H*0.1,  label:'화면 상단' },
    { x: W*0.5, y: H*0.9,  label:'화면 하단' },
    { x: W*0.12,y: H*0.5,  label:'화면 왼쪽' },
    { x: W*0.88,y: H*0.5,  label:'화면 오른쪽' },
  ];
}

const WAIT_DURATION   = 2500; // ms — stare at dot before sampling starts
const COLLECT_DURATION= 1800; // ms — actual sample collection
const SAMPLES_PER_PT  = 30;   // how many raw samples to average

let calTargets = [];
let calStepIdx = 0;
let calSampleBuf = [];
let calPhase = 'wait'; // 'wait' | 'collecting' | 'flash'
let calPhaseStart = 0;
let calAnimFrame = null;
let calCanvas, calCtx;
let calCountdownStart = null;

function startCalibration() {
  calPoints = [];
  calStepIdx = 0;
  calTargets = getCalTargets();
  calPhase = 'wait';
  calPhaseStart = 0;
  calCountdownStart = null;
  calSampleBuf = [];
  affine = null;

  calCanvas = $('cal-canvas');
  calCanvas.width  = window.innerWidth;
  calCanvas.height = window.innerHeight;
  calCtx = calCanvas.getContext('2d');

  show('calibration');
  $('gaze-dot').style.display = 'block';
  cancelAnimationFrame(calAnimFrame);
  calRenderLoop(performance.now());
}

function calRenderLoop(now) {
  if ($('screen-calibration').classList.contains('hidden')) return;

  const W = calCanvas.width, H = calCanvas.height;
  calCtx.clearRect(0, 0, W, H);

  // Background
  calCtx.fillStyle = '#050508';
  calCtx.fillRect(0, 0, W, H);

  const target = calTargets[calStepIdx];

  // ── Progress indicator (top) ──
  const totalSteps = calTargets.length;
  const dotSpacing = 28;
  const startX = W/2 - (totalSteps-1)*dotSpacing/2;
  for (let i=0; i<totalSteps; i++) {
    calCtx.beginPath();
    calCtx.arc(startX + i*dotSpacing, 32, 6, 0, Math.PI*2);
    if (i < calStepIdx)       calCtx.fillStyle = '#00ff88';
    else if (i === calStepIdx) calCtx.fillStyle = '#ff2244';
    else                       calCtx.fillStyle = '#1a1a2e';
    calCtx.fill();
  }

  // ── Step label ──
  calCtx.font = 'bold 12px Orbitron, monospace';
  calCtx.fillStyle = '#333355';
  calCtx.textAlign = 'center';
  calCtx.fillText(`STEP ${calStepIdx+1} / ${totalSteps}`, W/2, 56);

  // ── Instruction ──
  calCtx.font = '400 15px Noto Sans KR, sans-serif';
  calCtx.fillStyle = '#c8c8e0';
  calCtx.fillText(`"${target.label}"의 빨간 점을 바라봐 주세요`, W/2, H - 65);

  // ── Phase logic ──
  if (calPhase === 'wait') {
    if (calPhaseStart === 0) calPhaseStart = now;
    const elapsed = now - calPhaseStart;
    const remaining = Math.max(0, WAIT_DURATION - elapsed);
    const prog = elapsed / WAIT_DURATION;

    // Countdown number
    const cnt = Math.ceil(remaining/1000);
    calCtx.font = `bold 44px Orbitron, monospace`;
    calCtx.fillStyle = `rgba(200,200,224,${0.2 + 0.6*(1-prog)})`;
    calCtx.fillText(cnt > 0 ? cnt : '→', W/2, H/2 + 80);

    // Help text
    calCtx.font = '300 13px Noto Sans KR, sans-serif';
    calCtx.fillStyle = '#444466';
    calCtx.fillText('점에 시선을 고정하세요', W/2, H - 38);

    drawDotPulsing(target.x, target.y, prog);

    if (elapsed >= WAIT_DURATION) {
      calPhase = 'collecting';
      calPhaseStart = now;
      calSampleBuf = [];
    }

  } else if (calPhase === 'collecting') {
    const elapsed = now - calPhaseStart;
    const prog = Math.min(elapsed / COLLECT_DURATION, 1);

    // Collect sample every frame (capped at SAMPLES_PER_PT)
    if (calSampleBuf.length < 120) {
      calSampleBuf.push({ rx: smoothGaze.x, ry: smoothGaze.y });
      // Continuously train webgazer
      if (webgazerReady) webgazer.recordScreenPosition(target.x, target.y, 'move');
    }

    drawDotCollecting(target.x, target.y, prog);

    calCtx.font = '400 14px Noto Sans KR, sans-serif';
    calCtx.fillStyle = '#00ff88';
    calCtx.fillText('시선을 유지 중...', W/2, H/2 + 80);

    calCtx.font = '300 13px Noto Sans KR, sans-serif';
    calCtx.fillStyle = '#444466';
    calCtx.fillText(`샘플 ${calSampleBuf.length}개 수집`, W/2, H - 38);

    if (elapsed >= COLLECT_DURATION) {
      // Compute trimmed mean: remove top & bottom 10% outliers
      const avgRx = trimmedMean(calSampleBuf.map(s=>s.rx));
      const avgRy = trimmedMean(calSampleBuf.map(s=>s.ry));

      calPoints.push({ sx: target.x, sy: target.y, rx: avgRx, ry: avgRy });
      console.log(`Cal point ${calStepIdx}: screen(${target.x.toFixed(0)},${target.y.toFixed(0)}) ← raw(${avgRx.toFixed(0)},${avgRy.toFixed(0)})`);

      calStepIdx++;
      if (calStepIdx >= calTargets.length) {
        computeAffine();
        finishCalibration();
        return;
      }
      calPhase = 'wait';
      calPhaseStart = 0;
    }
  }

  // Update gaze preview cursor
  const g = getCalibratedGaze();
  $('gaze-dot').style.left = g.x + 'px';
  $('gaze-dot').style.top  = g.y + 'px';

  calAnimFrame = requestAnimationFrame(calRenderLoop);
}

// Pulsing red dot (during wait)
function drawDotPulsing(x, y, prog) {
  const t = performance.now() / 600;
  const pulse = 0.7 + 0.3 * Math.sin(t * Math.PI * 2);

  // Outer glow
  const grad = calCtx.createRadialGradient(x, y, 0, x, y, 55*pulse);
  grad.addColorStop(0, 'rgba(255,34,68,.25)');
  grad.addColorStop(1, 'rgba(255,34,68,0)');
  calCtx.beginPath(); calCtx.arc(x, y, 55*pulse, 0, Math.PI*2);
  calCtx.fillStyle = grad; calCtx.fill();

  // Main dot
  calCtx.beginPath(); calCtx.arc(x, y, 16, 0, Math.PI*2);
  calCtx.fillStyle = '#ff2244'; calCtx.fill();
  // Center
  calCtx.beginPath(); calCtx.arc(x, y, 4, 0, Math.PI*2);
  calCtx.fillStyle = '#fff'; calCtx.fill();
  // Crosshair
  calCtx.strokeStyle = 'rgba(255,34,68,.4)';
  calCtx.lineWidth = 1;
  calCtx.setLineDash([4,4]);
  calCtx.beginPath(); calCtx.moveTo(x-40, y); calCtx.lineTo(x+40, y); calCtx.stroke();
  calCtx.beginPath(); calCtx.moveTo(x, y-40); calCtx.lineTo(x, y+40); calCtx.stroke();
  calCtx.setLineDash([]);
}

// Progress ring (during collect)
function drawDotCollecting(x, y, prog) {
  // Glow
  const grad = calCtx.createRadialGradient(x, y, 0, x, y, 50);
  grad.addColorStop(0, 'rgba(0,255,136,.15)');
  grad.addColorStop(1, 'rgba(0,255,136,0)');
  calCtx.beginPath(); calCtx.arc(x, y, 50, 0, Math.PI*2);
  calCtx.fillStyle = grad; calCtx.fill();

  // Dot
  calCtx.beginPath(); calCtx.arc(x, y, 16, 0, Math.PI*2);
  calCtx.fillStyle = '#ff2244'; calCtx.fill();
  calCtx.beginPath(); calCtx.arc(x, y, 4, 0, Math.PI*2);
  calCtx.fillStyle = '#fff'; calCtx.fill();

  // Progress arc
  calCtx.beginPath();
  calCtx.arc(x, y, 28, -Math.PI/2, -Math.PI/2 + Math.PI*2*prog);
  calCtx.strokeStyle = '#00ff88';
  calCtx.lineWidth = 4;
  calCtx.lineCap = 'round';
  calCtx.stroke();

  // Background arc
  calCtx.beginPath();
  calCtx.arc(x, y, 28, -Math.PI/2 + Math.PI*2*prog, -Math.PI/2 + Math.PI*2);
  calCtx.strokeStyle = '#1a1a2e';
  calCtx.lineWidth = 4;
  calCtx.stroke();
}

// Trimmed mean: remove outer 15% extremes
function trimmedMean(arr) {
  if (arr.length < 4) return arr.reduce((s,v)=>s+v,0)/arr.length;
  const sorted = [...arr].sort((a,b)=>a-b);
  const trim = Math.floor(sorted.length * 0.15);
  const trimmed = sorted.slice(trim, sorted.length - trim);
  return trimmed.reduce((s,v)=>s+v,0) / trimmed.length;
}

/* ══════════════════════════════════════
   AFFINE TRANSFORM (Least-Squares)
   Maps raw WebGazer coords → screen coords
   px = ax*rx + bx*ry + cx
   py = ay*rx + by*ry + cy
══════════════════════════════════════ */
function computeAffine() {
  if (calPoints.length < 3) { affine = null; return; }

  // Build normal equations for A^T A x = A^T b
  let ATA = [[0,0,0],[0,0,0],[0,0,0]];
  let ATbx = [0,0,0];
  let ATby = [0,0,0];

  for (const p of calPoints) {
    const row = [p.rx, p.ry, 1];
    for (let i=0; i<3; i++) {
      ATbx[i] += row[i] * p.sx;
      ATby[i] += row[i] * p.sy;
      for (let j=0; j<3; j++) ATA[i][j] += row[i]*row[j];
    }
  }

  const cx = solveLinear3(ATA, ATbx);
  const cy = solveLinear3(ATA, ATby);

  if (!cx || !cy) {
    console.warn('Affine solve failed — using offset fallback');
    // Fallback: simple offset from center point
    const c = calPoints[0];
    affine = { ax:1, bx:0, cx:c.sx-c.rx, ay:0, by:1, cy:c.sy-c.ry };
    return;
  }

  affine = { ax:cx[0], bx:cx[1], cx:cx[2], ay:cy[0], by:cy[1], cy:cy[2] };

  // Sanity check: compute residuals
  let totalErr = 0;
  for (const p of calPoints) {
    const px = affine.ax*p.rx + affine.bx*p.ry + affine.cx;
    const py = affine.ay*p.rx + affine.by*p.ry + affine.cy;
    totalErr += Math.sqrt((px-p.sx)**2 + (py-p.sy)**2);
  }
  console.log(`Affine fit residual avg: ${(totalErr/calPoints.length).toFixed(1)}px`);
  console.log('Affine:', affine);
}

// Gaussian elimination (3×3)
function solveLinear3(A, b) {
  const M = A.map(r=>[...r]);
  const v = [...b];
  for (let col=0; col<3; col++) {
    let maxRow = col;
    for (let row=col+1; row<3; row++) {
      if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
    }
    [M[col], M[maxRow]] = [M[maxRow], M[col]];
    [v[col], v[maxRow]] = [v[maxRow], v[col]];
    if (Math.abs(M[col][col]) < 1e-10) return null;
    for (let row=col+1; row<3; row++) {
      const f = M[row][col] / M[col][col];
      for (let k=col; k<3; k++) M[row][k] -= f*M[col][k];
      v[row] -= f*v[col];
    }
  }
  const x = [0,0,0];
  for (let i=2; i>=0; i--) {
    x[i] = v[i];
    for (let j=i+1; j<3; j++) x[i] -= M[i][j]*x[j];
    x[i] /= M[i][i];
  }
  return x;
}

function getCalibratedGaze() {
  if (!affine) return smoothGaze;
  return {
    x: affine.ax*smoothGaze.x + affine.bx*smoothGaze.y + affine.cx,
    y: affine.ay*smoothGaze.x + affine.by*smoothGaze.y + affine.cy,
  };
}

function finishCalibration() {
  cancelAnimationFrame(calAnimFrame);
  hide('calibration');
  show('upload');
  startPreviewLoop();
}

/* ══════════════════════════════════════
   GAZE PREVIEW LOOP (outside game)
══════════════════════════════════════ */
let previewRAF = null;
function startPreviewLoop() {
  $('gaze-dot').style.display = 'block';
  const loop = () => {
    if (!$('screen-game').classList.contains('hidden')) { previewRAF = null; return; }
    const g = getCalibratedGaze();
    $('gaze-dot').style.left = g.x + 'px';
    $('gaze-dot').style.top  = g.y + 'px';
    previewRAF = requestAnimationFrame(loop);
  };
  if (!previewRAF) loop();
}

/* ══════════════════════════════════════
   UPLOAD
══════════════════════════════════════ */
$('upload-area').addEventListener('click', () => $('file-input').click());
$('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  imageURL = URL.createObjectURL(file);
  const img = new Image(); img.src = imageURL;
  $('upload-area').innerHTML = ''; $('upload-area').appendChild(img);
  $('btn-play').disabled = false;
});
$('btn-recal').addEventListener('click', () => { cancelAnimationFrame(previewRAF); previewRAF=null; hide('upload'); startCalibration(); });

/* ══════════════════════════════════════
   GAME
══════════════════════════════════════ */
let gameRunning = false;
let gameStartTime = 0;
let dangerStart = null;
const DANGER_GRACE = 500;
const REVEAL_DURATION = 2000;
let gameRAF, timerInterval;

$('btn-play').addEventListener('click', startGame);
$('btn-retry').addEventListener('click', () => { hide('gameover'); startGame(); });
$('btn-home').addEventListener('click', () => { hide('gameover'); show('title'); startPreviewLoop(); });

function startGame() {
  if (!imageURL) return;
  cancelAnimationFrame(previewRAF); previewRAF = null;
  show('game'); hide('upload'); hide('gameover');
  $('gaze-dot').style.display = 'block';

  const gameImg = $('game-image');
  if (gameImg.src === imageURL) {
    initGameState();
  } else {
    gameImg.src = imageURL;
    gameImg.onload = initGameState;
  }
}

function initGameState() {
  $('cover-black').style.height = '75%';
  gameRunning = true;
  gameStartTime = performance.now();
  dangerStart = null;
  $('timer-display').textContent = '0.00';
  $('status-dot').className = '';
  timerInterval = setInterval(() => {
    if (gameRunning) $('timer-display').textContent = ((performance.now()-gameStartTime)/1000).toFixed(2);
  }, 50);
  cancelAnimationFrame(gameRAF);
  gameRAF = requestAnimationFrame(gameLoop);
}

function gameLoop(now) {
  if (!gameRunning) return;
  const elapsed = now - gameStartTime;

  // Reveal: cover shrinks 75% → 0% over REVEAL_DURATION
  const coverPct = 75 * (1 - Math.min(elapsed / REVEAL_DURATION, 1));
  $('cover-black').style.height = coverPct + '%';

  // Get calibrated gaze (screen coords)
  const g = getCalibratedGaze();

  // Update global gaze cursor
  $('gaze-dot').style.left = g.x + 'px';
  $('gaze-dot').style.top  = g.y + 'px';

  // Map to game viewport
  const vp = $('game-viewport').getBoundingClientRect();
  const relX = g.x - vp.left;
  const relY = g.y - vp.top;
  const safeLimit = vp.height * 0.25;
  const inSafe = relY >= 0 && relY <= safeLimit && relX >= 0 && relX <= vp.width;

  if (inSafe) {
    dangerStart = null;
    $('status-dot').className = '';
    $('gaze-dot').className = '';
    $('warning-bar').classList.remove('show');
    $('flash').className = '';
  } else {
    if (!dangerStart) dangerStart = now;
    const dangerElapsed = now - dangerStart;
    if (dangerElapsed >= DANGER_GRACE) { gameOver(elapsed); return; }
    $('status-dot').className = 'danger';
    $('gaze-dot').className = 'danger';
    $('warning-bar').classList.add('show');
    $('flash').className = Math.floor(dangerElapsed/120)%2===0 ? 'on' : '';
  }

  gameRAF = requestAnimationFrame(gameLoop);
}

function gameOver(elapsed) {
  gameRunning = false;
  cancelAnimationFrame(gameRAF);
  clearInterval(timerInterval);
  $('flash').className = '';
  $('warning-bar').classList.remove('show');
  $('gaze-dot').className = '';
  $('final-time').textContent = (elapsed/1000).toFixed(2);
  hide('game');
  show('gameover');
  startPreviewLoop();
}

/* ══════════════════════════════════════
   STARTUP FLOW
══════════════════════════════════════ */
$('btn-start-flow').addEventListener('click', async () => {
  hide('title');

  // Loading screen
  const loader = document.createElement('div');
  loader.id = 'loader';
  loader.style.cssText = `
    position:fixed;inset:0;background:#050508;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;z-index:1000;
  `;
  loader.innerHTML = `
    <div style="font-family:Orbitron,monospace;font-size:.85rem;color:#555580;letter-spacing:.2em;">카메라 초기화 중...</div>
    <div style="width:44px;height:44px;border:3px solid #1a1a2e;border-top-color:#ff2244;border-radius:50%;animation:spin .9s linear infinite;"></div>
    <div style="font-family:'Noto Sans KR',sans-serif;font-size:.75rem;color:#333355;max-width:260px;text-align:center;line-height:1.6;">
      전면 카메라 권한을 허용해 주세요.<br>카메라는 시선 감지에만 사용됩니다.
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  `;
  document.body.appendChild(loader);

  await initWebgazer();
  // Give face mesh time to stabilize
  await new Promise(r => setTimeout(r, 1500));
  document.body.removeChild(loader);

  startCalibration();
});
</script>
